android.useAndroidX=true
android.enableJetifier=true

# 设置Java Home (Android Studio JBR)
org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home

# 增加Gradle Java堆内存
org.gradle.jvmargs=-Xmx4g -Xms2g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# D8编译器内存配置
android.dexOptions.javaMaxHeapSize=4g
android.dexOptions.jumboMode=true
android.dexOptions.preDexLibraries=true

# 启用并行构建和缓存
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.workers.max=2

# 抑制compileSdk警告
android.suppressUnsupportedCompileSdk=35